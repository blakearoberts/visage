name: Auto-Merge

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (
          github.event.pull_request.head.ref == 'codex' &&
          github.event.pull_request.user.login == 'blakearoberts'
        ) ||
        (
          startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
          github.event.pull_request.user.login == 'dependabot[bot]'
        ) ||
        startsWith(github.event.pull_request.head.ref, 'release/v')
      )
    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTO_MERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          mapfile -t changed_paths < <(gh pr diff --name-only "$PR_URL")

          if [[ "$PR_HEAD_REF" == release/v* ]]; then
            if [[ ! "$PR_HEAD_REF" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$PR_HEAD_REF is not a stable release branch."
              gh pr merge --disable-auto "$PR_URL" || true
              exit 0
            fi
          fi

          for path in "${changed_paths[@]}"; do
            case "$path" in
              .github/workflows/release.yml|.github/workflows/publish.yml)
                echo "$path requires manual merge; disabling auto-merge for $PR_URL."
                gh pr merge --disable-auto "$PR_URL" || true
                exit 0
                ;;
            esac

            if [[ "$PR_HEAD_REF" == release/v* ]]; then
              case "$path" in
                package.json|package-lock.json)
                  ;;
                *)
                  echo "$path requires manual merge for release PR $PR_URL."
                  gh pr merge --disable-auto "$PR_URL" || true
                  exit 0
                  ;;
              esac
            fi
          done

          gh pr merge --auto --merge --delete-branch "$PR_URL"
