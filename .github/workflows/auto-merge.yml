name: Auto-Merge

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - 'dependabot/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTO_MERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Enable auto-merge
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          pr_url="$(
            gh pr list \
              --base main \
              --head "$HEAD_BRANCH" \
              --json url \
              --jq '.[0].url // empty'
          )"

          if [ -z "$pr_url" ]; then
            echo "No open pull request found for $HEAD_BRANCH."
            exit 0
          fi

          gh pr merge --auto --merge --delete-branch "$pr_url"

  rebase:
    name: Rebase Dependabot Pull Requests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTO_MERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Request rebases
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          gh pr list \
            --author 'app/dependabot' \
            --base main \
            --state open \
            --json url \
            --jq '.[].url' |
            while IFS= read -r pr_url; do
              gh pr comment "$pr_url" --body '@dependabot rebase'
            done
