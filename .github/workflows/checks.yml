name: Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - run: npm ci

      - run: npm run check

      - run: npm test

      - run: npm run build

      - name: Pack
        run: |
          mkdir -p package
          npm pack --workspace @blakearoberts/visage --pack-destination package

      - uses: actions/upload-artifact@v7
        with:
          name: package
          path: package/*.tgz
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - run: npm ci

      - name: Install mkcert
        run: |
          sudo apt-get update
          sudo apt-get install -y mkcert

      - name: Pull Docker images
        run: |
          docker compose -f packages/visage/docker-compose.images.yml pull
          docker pull traefik/whoami

      - uses: actions/download-artifact@v8
        with:
          name: package
          path: package

      - name: Extract package artifact
        run: |
          mkdir -p package/e2e
          tar -xzf package/*.tgz -C package/e2e

      - run: npm --ignore-scripts run test:e2e
        timeout-minutes: 3
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
          VISAGE_E2E_PACKAGE_ENTRY: ${{ github.workspace }}/package/e2e/package/dist/index.js

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: test-results
          retention-days: 1
