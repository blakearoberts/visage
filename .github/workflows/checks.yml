name: Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - run: npm ci

      - run: npm run format:check

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Pack
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - uses: actions/upload-artifact@v7
        with:
          name: package
          path: package/*.tgz
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - run: npm ci

      - name: Install mkcert
        run: |
          sudo apt-get update
          sudo apt-get install -y mkcert

      - uses: actions/download-artifact@v8
        with:
          name: package
          path: package

      - run: npm install --prefix examples/simple --package-lock=false --no-save ./package/*.tgz

      - run: npm install --prefix examples/ssr --package-lock=false --no-save ./package/*.tgz

      - run: npm install --prefix examples/external-idp --package-lock=false --no-save ./package/*.tgz

      - name: Pull e2e Docker images
        run: |
          docker compose -f docker-compose.images.yml pull
          docker pull traefik/whoami

      - run: npm run test:e2e
        timeout-minutes: 3
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: test-results
          retention-days: 1
