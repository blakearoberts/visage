name: Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Pack
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - uses: actions/upload-artifact@v7
        with:
          name: package
          path: package/*.tgz
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: package
          path: package

      - name: Install simple example app
        run: npm install --prefix examples/simple --package-lock=false --no-save ./package/*.tgz

      - name: Install SSR example app
        run: npm install --prefix examples/ssr --package-lock=false --no-save ./package/*.tgz

      - name: Install external IdP example app
        run: npm install --prefix examples/external-idp --package-lock=false --no-save ./package/*.tgz

      - name: Pull e2e Docker images
        run: |
          docker compose -f docker-compose.images.yml pull
          docker pull traefik/whoami

      - name: Test
        timeout-minutes: 3
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: npm run test:e2e

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: test-results
          retention-days: 1
