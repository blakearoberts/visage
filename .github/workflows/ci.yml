name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable npm version to release. Defaults to the current package version without any prerelease suffix.
        required: false
        type: string
  push:
    branches: [main, codex]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Pack
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - uses: actions/upload-artifact@v7
        with:
          name: package
          path: package/*.tgz
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: package
          path: package

      - name: Install managed service example app
        run: npm install --prefix examples/managed-service --package-lock=false --no-save ./package/*.tgz

      - name: Install external IdP example app
        run: npm install --prefix examples/external-idp --package-lock=false --no-save ./package/*.tgz

      - name: Pull e2e Docker images
        run: |
          docker pull ghcr.io/dexidp/dex:v2.45.1
          docker pull nginx:1.30.0-alpine
          docker pull quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          docker pull traefik/whoami

      - name: Test
        timeout-minutes: 3
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: npm run test:e2e

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: test-results
          retention-days: 1

  publish-rc:
    name: Publish RC
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve RC version
        id: rc-version
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          current_version="$(node -p "require('./package.json').version")"
          base_version="${current_version%%-*}"
          versions_json="$(npm view "$package_name" versions --json 2>/dev/null || echo '[]')"
          rc_version="$(
            BASE_VERSION="$base_version" CURRENT_VERSION="$current_version" VERSIONS_JSON="$versions_json" node --input-type=module <<'NODE'
          const base = process.env.BASE_VERSION;
          const current = process.env.CURRENT_VERSION;
          const parsed = JSON.parse(process.env.VERSIONS_JSON || '[]');
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          const escapedBase = base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const rcPattern = new RegExp(`^${escapedBase}-rc\\.(\\d+)$`);
          let maxRc = -1;

          for (const version of [current, ...versions]) {
            const match = String(version).match(rcPattern);
            if (match) {
              maxRc = Math.max(maxRc, Number(match[1]));
            }
          }

          console.log(`${base}-rc.${maxRc + 1}`);
          NODE
          )"

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$rc_version" >> "$GITHUB_OUTPUT"

      - name: Build RC package
        run: |
          npm version "${{ steps.rc-version.outputs.version }}" --no-git-tag-version --ignore-scripts
          npm ci
          npm run build
          mkdir -p package
          npm pack --pack-destination package

      - name: Publish RC to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.rc-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.rc-version.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; moving the next dist-tag."
          else
            npm publish ./package/*.tgz --access public --tag next --provenance
          fi

          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" next

  delete-merged-codex:
    name: Delete merged codex branch
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete merged codex branch
        run: |
          set -euo pipefail

          if ! git ls-remote --exit-code --heads origin codex >/dev/null 2>&1; then
            echo "No remote codex branch to delete."
            exit 0
          fi

          git fetch origin codex:refs/remotes/origin/codex

          if ! git merge-base --is-ancestor refs/remotes/origin/codex HEAD; then
            echo "Remote codex branch is not merged into this main commit."
            exit 0
          fi

          git push origin --delete codex

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./package.json').version")"
          package_name="$(node -p "require('./package.json').name")"
          requested_version="${{ inputs.version }}"

          if [[ -z "$requested_version" ]]; then
            release_version="${current_version%%-*}"
          else
            release_version="${requested_version#v}"
          fi

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be a stable semver version like 1.2.3." >&2
            exit 1
          fi

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Validate release target
        env:
          PACKAGE_NAME: ${{ steps.release-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Releases must be dispatched from main." >&2
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main --tags

          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved after this workflow started. Re-run the release from the latest main." >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag $RELEASE_TAG already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin." >&2
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published to npm." >&2
            exit 1
          fi

      - name: Bump release version
        env:
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail

          npm version "$PACKAGE_VERSION" --no-git-tag-version --ignore-scripts

          if git diff --quiet -- package.json package-lock.json; then
            echo "Version bump did not change package.json or package-lock.json." >&2
            exit 1
          fi

      - name: Build release package
        run: |
          npm ci
          npm run build
          mkdir -p package
          npm pack --pack-destination package

      - name: Commit and tag release
        env:
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): $RELEASE_TAG"
          git tag "$RELEASE_TAG"
          git push origin HEAD:main
          git push origin "$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.release-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes "Published [$PACKAGE_NAME@$PACKAGE_VERSION](https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION) to npm with the \`latest\` dist-tag."

      - name: Publish release to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.release-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          npm publish ./package/*.tgz --access public --tag latest --provenance
          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" latest
