name: CI

on:
  push:
    branches: [main, codex]

concurrency:
  group: visage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read

  publish-rc:
    name: Publish RC
    runs-on: ubuntu-latest
    needs: checks
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve RC version
        if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
        id: rc-version
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          current_version="$(node -p "require('./package.json').version")"
          base_version="${current_version%%-*}"
          versions_json="$(npm view "$package_name" versions --json 2>/dev/null || echo '[]')"
          rc_version="$(
            BASE_VERSION="$base_version" CURRENT_VERSION="$current_version" VERSIONS_JSON="$versions_json" node --input-type=module <<'NODE'
          const base = process.env.BASE_VERSION;
          const current = process.env.CURRENT_VERSION;
          const parsed = JSON.parse(process.env.VERSIONS_JSON || '[]');
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          const escapedBase = base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const rcPattern = new RegExp(`^${escapedBase}-rc\\.(\\d+)$`);
          let maxRc = -1;

          for (const version of [current, ...versions]) {
            const match = String(version).match(rcPattern);
            if (match) {
              maxRc = Math.max(maxRc, Number(match[1]));
            }
          }

          console.log(`${base}-rc.${maxRc + 1}`);
          NODE
          )"

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$rc_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$rc_version" >> "$GITHUB_OUTPUT"

      - name: Build RC package
        if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
        run: |
          npm version "${{ steps.rc-version.outputs.version }}" --no-git-tag-version --ignore-scripts
          npm ci
          npm run build
          mkdir -p package
          npm pack --pack-destination package

      - name: Publish RC to npm
        if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.rc-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.rc-version.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; moving the next dist-tag."
          else
            npm publish ./package/*.tgz --access public --tag next --provenance
          fi

          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" next

      - name: Publish GitHub RC release
        if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.rc-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.rc-version.outputs.version }}
          RELEASE_TAG: ${{ steps.rc-version.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
              echo "Tag $RELEASE_TAG already exists at $tag_commit, expected $GITHUB_SHA." >&2
              exit 1
            fi
          elif git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
              echo "Tag $RELEASE_TAG already exists on origin at $tag_commit, expected $GITHUB_SHA." >&2
              exit 1
            fi
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "$RELEASE_TAG"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --prerelease \
              --title "$RELEASE_TAG" \
              --notes "Published [$PACKAGE_NAME@$PACKAGE_VERSION](https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION) to npm with the \`next\` dist-tag."
          fi

      - name: Delete merged codex branch
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail

          if ! git ls-remote --exit-code --heads origin codex >/dev/null 2>&1; then
            echo "No remote codex branch to delete."
            exit 0
          fi

          git fetch origin codex:refs/remotes/origin/codex

          if ! git merge-base --is-ancestor refs/remotes/origin/codex HEAD; then
            echo "Remote codex branch is not merged into this main commit."
            exit 0
          fi

          git push origin --delete codex
