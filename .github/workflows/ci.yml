name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: visage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml
    permissions:
      contents: read
