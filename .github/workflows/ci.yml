name: CI

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Pack
        run: |
          mkdir -p package
          npm pack --pack-destination package

      - uses: actions/upload-artifact@v6
        with:
          name: package
          path: package/*.tgz
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v6
        with:
          name: package
          path: package

      - name: Install managed service example app
        run: npm install --prefix examples/managed-service --package-lock=false --no-save ./package/*.tgz

      - name: Install external IdP example app
        run: npm install --prefix examples/external-idp --package-lock=false --no-save ./package/*.tgz

      - name: Test
        timeout-minutes: 3
        env:
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
        run: npm run test:e2e

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v6
        with:
          name: package
          path: package

      - name: Resolve npm dist tag
        id: dist-tag
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$version" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish ./package/*.tgz --access public --tag "${{ steps.dist-tag.outputs.tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
