name: Publish npm Package

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      package-name:
        required: true
        type: string
      stable-release:
        required: true
        type: boolean
      next-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: ${{ inputs.package-name }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Prepare package
        env:
          NEXT_VERSION: ${{ inputs.next-version }}
          STABLE_RELEASE: ${{ inputs.stable-release }}
        run: |
          set -euo pipefail

          rm -rf package-publish package-work
          mkdir -p package-publish

          if [[ "$STABLE_RELEASE" == "false" ]]; then
            mkdir -p package-work
            tar -xzf *.tgz -C package-work
            (
              cd package-work/package
              npm version "$NEXT_VERSION" --no-git-tag-version --ignore-scripts --allow-same-version
            )
            npm pack ./package-work/package --pack-destination package-publish --ignore-scripts
          else
            cp *.tgz package-publish/
          fi

      - env:
          NPM_DIST_TAG: ${{ inputs.stable-release && 'latest' || 'next' }}
        run: npm publish ./package-publish/*.tgz --access public --tag "$NPM_DIST_TAG" --provenance
