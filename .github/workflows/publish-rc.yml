name: Publish RC

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: visage-publish-rc-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-rc:
    name: Resolve RC Target
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    outputs:
      package-name: ${{ steps.rc-version.outputs.package-name }}
      should-publish: ${{ steps.rc-version.outputs.should-publish }}
      tag: ${{ steps.rc-version.outputs.tag }}
      version: ${{ steps.rc-version.outputs.version }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve RC version
        id: rc-version
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          current_version="$(node -p "require('./package.json').version")"
          current_tag="v$current_version"

          release_marker=false
          if git log -1 --format=%B HEAD | grep -Fq "chore(release): $current_tag"; then
            release_marker=true
          elif git rev-parse --verify --quiet HEAD^2 >/dev/null; then
            if git log -1 --format=%B HEAD^2 | grep -Fq "chore(release): $current_tag"; then
              release_marker=true
            fi
          fi

          if [[ "$release_marker" == "true" ]]; then
            echo "package-name=" >> "$GITHUB_OUTPUT"
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "$current_tag is a stable release merge; skipping RC publish."
            exit 0
          fi

          versions_json="$(npm view "$package_name" versions --json 2>/dev/null || echo '[]')"
          rc_version="$(
            CURRENT_VERSION="$current_version" VERSIONS_JSON="$versions_json" node --input-type=module <<'NODE'
          const current = process.env.CURRENT_VERSION;
          const parsed = JSON.parse(process.env.VERSIONS_JSON || '[]');
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          const currentMatch = current.match(/^(\d+)\.(\d+)\.(\d+)(?:-.+)?$/);

          if (!currentMatch) {
            throw new Error(`Unsupported package version: ${current}`);
          }

          const [, major, minor, patch] = currentMatch;
          const base = current.includes('-')
            ? `${major}.${minor}.${patch}`
            : `${major}.${minor}.${Number(patch) + 1}`;
          const currentRcMatch = current.match(/^(\d+)\.(\d+)\.(\d+)-rc\.(\d+)$/);
          const currentRcBase = currentRcMatch
            ? `${currentRcMatch[1]}.${currentRcMatch[2]}.${currentRcMatch[3]}`
            : '';
          const minimumRc = currentRcBase === base ? Number(currentRcMatch[4]) : 0;
          const escapedBase = base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const rcPattern = new RegExp(`^${escapedBase}-rc\\.(\\d+)$`);
          let maxRc = -1;

          for (const version of versions) {
            const match = String(version).match(rcPattern);
            if (match) {
              maxRc = Math.max(maxRc, Number(match[1]));
            }
          }

          console.log(`${base}-rc.${Math.max(maxRc + 1, minimumRc)}`);
          NODE
          )"

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$rc_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$rc_version" >> "$GITHUB_OUTPUT"
          echo "should-publish=true" >> "$GITHUB_OUTPUT"

  publish-rc:
    name: Publish RC
    runs-on: ubuntu-latest
    needs: resolve-rc
    if: needs.resolve-rc.outputs.should-publish == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Build RC package
        run: |
          npm version "${{ needs.resolve-rc.outputs.version }}" --no-git-tag-version --ignore-scripts
          npm ci
          npm run build
          mkdir -p package
          npm pack --pack-destination package

      - name: Publish RC to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ needs.resolve-rc.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.resolve-rc.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; moving the next dist-tag."
          else
            npm publish ./package/*.tgz --access public --tag next --provenance
          fi

          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" next

      - name: Publish GitHub RC release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.resolve-rc.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.resolve-rc.outputs.version }}
          RELEASE_COMMIT: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ needs.resolve-rc.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
              echo "Tag $RELEASE_TAG already exists at $tag_commit, expected $RELEASE_COMMIT." >&2
              exit 1
            fi
          elif git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
              echo "Tag $RELEASE_TAG already exists on origin at $tag_commit, expected $RELEASE_COMMIT." >&2
              exit 1
            fi
          else
            git tag "$RELEASE_TAG" "$RELEASE_COMMIT"
            git push origin "$RELEASE_TAG"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --prerelease \
              --title "$RELEASE_TAG" \
              --notes "Published [$PACKAGE_NAME@$PACKAGE_VERSION](https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION) to npm with the \`next\` dist-tag."
          fi
