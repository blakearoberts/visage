name: Publish Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: visage-publish-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve Release Target
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    outputs:
      package-name: ${{ steps.release-target.outputs.package-name }}
      should-publish: ${{ steps.release-target.outputs.should-publish }}
      tag: ${{ steps.release-target.outputs.tag }}
      version: ${{ steps.release-target.outputs.version }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve release target
        id: release-target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          release_version="$(node -p "require('./package.json').version")"
          release_tag="v$release_version"

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package-name=" >> "$GITHUB_OUTPUT"
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Package version $release_version is not a stable release version."
            exit 0
          fi

          git fetch origin main:refs/remotes/origin/main --tags

          if [[ "$(git rev-parse HEAD)" != "$RELEASE_COMMIT" ]]; then
            echo "Checked out $(git rev-parse HEAD), expected $RELEASE_COMMIT." >&2
            exit 1
          fi

          if [[ "$RELEASE_COMMIT" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved after CI passed. Re-run the release from the latest main." >&2
            exit 1
          fi

          npm_exists=false
          if npm view "$package_name@$release_version" version >/dev/null 2>&1; then
            npm_exists=true
          fi

          tag_exists=false
          tag_commit=""
          if git rev-parse --verify --quiet "refs/tags/$release_tag" >/dev/null; then
            tag_exists=true
            tag_commit="$(git rev-parse "$release_tag^{commit}")"
          elif git ls-remote --exit-code --tags origin "$release_tag" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$release_tag:refs/tags/$release_tag"
            tag_exists=true
            tag_commit="$(git rev-parse "$release_tag^{commit}")"
          fi

          if [[ "$tag_exists" == "true" && "$tag_commit" != "$RELEASE_COMMIT" ]]; then
            if [[ "$npm_exists" == "true" ]]; then
              echo "package-name=" >> "$GITHUB_OUTPUT"
              echo "should-publish=false" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "$release_tag is already released at $tag_commit."
              exit 0
            fi

            echo "$release_tag exists at $tag_commit, expected $RELEASE_COMMIT." >&2
            exit 1
          fi

          release_pr="$(
            gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_COMMIT/pulls" \
              --jq '.[] | select(.base.ref == "main") | [.number, .head.ref, .user.login, .title] | @tsv' |
              head -n 1
          )"

          if [[ -z "$release_pr" ]]; then
            echo "No merged pull request found for $RELEASE_COMMIT." >&2
            exit 1
          fi

          IFS=$'\t' read -r pr_number pr_head_ref pr_author pr_title <<< "$release_pr"
          expected_head_ref="release/$release_tag"
          expected_title="chore(release): $release_tag"

          if [[ "$pr_head_ref" != "$expected_head_ref" ]]; then
            echo "Release PR #$pr_number head is $pr_head_ref, expected $expected_head_ref." >&2
            exit 1
          fi

          if [[ "$pr_author" != "github-actions[bot]" ]]; then
            echo "Release PR #$pr_number author is $pr_author, expected github-actions[bot]." >&2
            exit 1
          fi

          if [[ "$pr_title" != "$expected_title" ]]; then
            echo "Release PR #$pr_number title is $pr_title, expected $expected_title." >&2
            exit 1
          fi

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "should-publish=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: resolve-release
    if: needs.resolve-release.outputs.should-publish == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Validate release target
        env:
          RELEASE_COMMIT: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main --tags

          if [[ "$(git rev-parse HEAD)" != "$RELEASE_COMMIT" ]]; then
            echo "Checked out $(git rev-parse HEAD), expected $RELEASE_COMMIT." >&2
            exit 1
          fi

          if [[ "$RELEASE_COMMIT" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved after CI passed. Re-run the release from the latest main." >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
              echo "Tag $RELEASE_TAG already exists at $tag_commit, expected $RELEASE_COMMIT." >&2
              exit 1
            fi
          elif git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
              echo "Tag $RELEASE_TAG already exists on origin at $tag_commit, expected $RELEASE_COMMIT." >&2
              exit 1
            fi
          fi

      - name: Build release package
        run: |
          npm ci
          npm run build
          mkdir -p package
          npm pack --pack-destination package

      - name: Tag release
        env:
          RELEASE_COMMIT: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
              echo "Tag $RELEASE_TAG already exists at $tag_commit, expected $RELEASE_COMMIT." >&2
              exit 1
            fi
          else
            git tag "$RELEASE_TAG" "$RELEASE_COMMIT"
            git push origin "$RELEASE_TAG"
          fi

      - name: Publish release to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ needs.resolve-release.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
          else
            npm publish ./package/*.tgz --access public --tag latest --provenance
          fi

          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" latest
          npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" next

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.resolve-release.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.resolve-release.outputs.version }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          notes="Published [$PACKAGE_NAME@$PACKAGE_VERSION](https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION) to npm with the \`latest\` and \`next\` dist-tags."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "$notes"
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes "$notes"
          fi
