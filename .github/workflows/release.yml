name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable npm version to release. Defaults to the current package version without any prerelease suffix.
        required: false
        type: string

concurrency:
  group: visage-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: release-version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./packages/visage/package.json').version")"
          package_name="$(node -p "require('./packages/visage/package.json').name")"
          component_name="${package_name##*/}"
          requested_version="${{ inputs.version }}"

          if [[ -z "$requested_version" ]]; then
            release_version="${current_version%%-*}"
          else
            release_version="${requested_version#v}"
          fi

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be a stable semver version like 1.2.3." >&2
            exit 1
          fi

          echo "branch=release/$component_name/v$release_version" >> "$GITHUB_OUTPUT"
          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Validate target
        env:
          PACKAGE_NAME: ${{ steps.release-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_BRANCH: ${{ steps.release-version.outputs.branch }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Releases must be dispatched from main." >&2
            exit 1
          fi

          if [[ "$GITHUB_ACTOR" != "blakearoberts" ]]; then
            echo "Only blakearoberts may dispatch stable releases." >&2
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main --tags

          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main moved after this workflow started. Re-run the release from the latest main." >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag $RELEASE_TAG already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin." >&2
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Release branch $RELEASE_BRANCH already exists on origin. Inspect the existing branch or pull request before retrying." >&2
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published to npm." >&2
            exit 1
          fi

      - name: Bump version
        env:
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail

          npm version "$PACKAGE_VERSION" --workspace @blakearoberts/visage --no-git-tag-version --ignore-scripts

          if git diff --quiet -- packages/visage/package.json package-lock.json; then
            echo "Version bump did not change packages/visage/package.json or package-lock.json." >&2
            exit 1
          fi

      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTO_MERGE_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_MERGE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PACKAGE_NAME: ${{ steps.release-version.outputs.package-name }}
          PACKAGE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_BRANCH: ${{ steps.release-version.outputs.branch }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_notes_args=(-f "tag_name=$RELEASE_TAG")
          previous_tag="$(
            git for-each-ref \
              --merged HEAD \
              --sort=-version:refname \
              --format='%(refname:strip=2)' \
              refs/tags |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              head -n 1 || true
          )"
          if [[ -n "$previous_tag" ]]; then
            release_notes_args+=(-f "previous_tag_name=$previous_tag")
          fi

          git checkout -B "$RELEASE_BRANCH"
          git add packages/visage/package.json package-lock.json
          git commit -m "chore(release): $RELEASE_TAG"

          npm_url="https://www.npmjs.com/package/${PACKAGE_NAME}/v/${PACKAGE_VERSION}"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          release_notes_args+=(-f "target_commitish=$(git rev-parse HEAD^)")
          release_notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" "${release_notes_args[@]}" --jq .body)"

          {
            echo "## Release"
            echo
            echo "- Package: [$PACKAGE_NAME@$PACKAGE_VERSION]($npm_url)"
            echo "- GitHub release: [$RELEASE_TAG]($release_url)"
            echo
            printf '%s\n' "$release_notes"
          } > release-pr.md

          authenticated_origin="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push "$authenticated_origin" HEAD:"$RELEASE_BRANCH"

          pr_url="$(
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): $RELEASE_TAG" \
              --body-file release-pr.md
          )"

          echo "Release PR: $pr_url"
