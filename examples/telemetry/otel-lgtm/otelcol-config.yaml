file_format: '1.1'

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'oauth2-proxy'
          scrape_interval: 10s
          static_configs:
            - targets: ['nginx:4181']

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: '/ready'

processors:
  batch:

exporters:
  otlp_http/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [otlp_http/metrics]
