apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth2-proxy-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oauth2-proxy-operator
rules:
  - apiGroups: ['gateway.networking.k8s.io']
    resources: ['httproutes']
    verbs: ['get', 'list', 'watch', 'update', 'patch']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'create', 'update', 'delete']
  - apiGroups: ['']
    resources: ['secrets', 'services']
    verbs: ['get', 'create', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oauth2-proxy-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oauth2-proxy-operator
subjects:
  - kind: ServiceAccount
    name: oauth2-proxy-operator
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-operator
  template:
    metadata:
      labels:
        app: oauth2-proxy-operator
    spec:
      serviceAccountName: oauth2-proxy-operator
      containers:
        - name: operator
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: OAUTH2_PROXY_IMAGE
              value: {{ required "oauth2ProxyImage is required" .Values.oauth2ProxyImage | quote }}
      resources:
