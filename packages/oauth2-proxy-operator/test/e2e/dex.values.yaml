fullnameOverride: dex
image:
  tag: v2.45.1
rbac:
  create: false
serviceAccount:
  create: false
config:
  storage:
    type: memory
  oauth2:
    skipApprovalScreen: true
  expiry:
    idTokens: 20s
    refreshTokens:
      validIfNotUsedFor: 2m
  staticClients:
    - id: e2e
      name: e2e
      public: true
      redirectURIs: []
  enablePasswordDB: true
  staticPasswords:
    - email: user@example.com
      username: user
      userID: user@example.com
      hash: '$2b$10$j5ZmfQIkYF3P5nDLQU3niOonQXFPM5c0yu7BiTT/8E4Eb21/nvSVK'
httpRoute:
  enabled: true
  parentRefs:
    - name: app
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dex
